<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<title>Paper Piano — Printable Template</title>
<style>
  @page {
    size: A4 landscape;
    margin: 0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 297mm;
    height: 210mm;
    background: #fff;
    font-family: 'Poppins', sans-serif;
    color: #1a1a1a;
    overflow: hidden;
  }
  .page {
    width: 297mm;
    height: 210mm;
    padding: 8mm 10mm;
    position: relative;
  }

  /* ─── Title ─── */
  .title {
    font-size: 28pt;
    font-weight: bold;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1mm;
  }
  .subtitle {
    font-size: 14pt;
    color: #666;
    letter-spacing: 0.08em;
    margin-bottom: 4mm;
  }

  /* ─── Keyboard section ─── */
  .keyboard-section {
    display: flex;
    gap: 4mm;
    align-items: flex-end;
  }

  /* Ribbon column */
  .ribbon-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    width: 16mm;
    flex-shrink: 0;
  }
  .ribbon-marker {
    display: flex;
    align-items: center;
    gap: 1.5mm;
  }
  .ribbon-label {
    font-size: 10pt;
    color: #888;
    width: 5mm;
    text-align: right;
  }

  /* Key area */
  .key-area {
    flex: 1;
  }

  /* Key markers row */
  .key-markers {
    position: relative;
    height: 14mm;
    margin-bottom: 1mm;
  }
  .key-marker {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5mm;
  }
  .key-marker-label {
    font-size: 10pt;
    color: #888;
  }

  /* Piano keys */
  .piano {
    position: relative;
    height: 50mm;
    border: 0.5mm solid #1a1a1a;
    border-radius: 2mm;
    background: #fff;
    overflow: hidden;
  }
  .white-key {
    position: absolute;
    top: 0;
    height: 100%;
    border-right: 0.3mm solid #333;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 3mm;
    font-size: 16pt;
    color: #888;
  }
  .white-key:last-of-type {
    border-right: none;
  }
  .black-key {
    position: absolute;
    top: 0;
    height: 62%;
    background: #1a1a1a;
    border-radius: 0 0 1.5mm 1.5mm;
    z-index: 2;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 2mm;
    font-size: 12pt;
    color: #999;
  }

  /* ─── Control section (above keyboard) ─── */
  .controls {
    margin-bottom: 4mm;
    margin-left: 20mm; /* align with keyboard left (16mm ribbon + 4mm gap) */
    display: flex;
    gap: 4mm;
    align-items: flex-start;
  }
  .ctrl-col {
    border: 0.3mm solid #999;
    border-radius: 3mm;
    padding: 3mm 4mm;
  }
  .ctrl-col-label {
    font-size: 12pt;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 2mm;
    text-align: center;
  }
  .ctrl-grid {
    display: grid;
    grid-template-columns: repeat(3, auto);
    gap: 3mm;
    justify-items: center;
  }
  .ctrl-grid-4 {
    display: grid;
    grid-template-columns: repeat(4, auto);
    gap: 3mm;
    justify-items: center;
  }
  .ctrl-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1mm;
  }
  .ctrl-label {
    font-size: 11pt;
    color: #555;
    text-align: center;
    letter-spacing: 0.05em;
  }
  .ctrl-col-dual {
    display: flex;
    gap: 4mm;
  }
  .ctrl-col-dual > div {
    flex: 1;
  }

  /* ─── Footer ─── */
  .footer {
    display: flex;
    justify-content: space-between;
    font-size: 11pt;
    color: #aaa;
    margin-top: 4mm;
  }

  /* ─── ArUco marker canvas ─── */
  .aruco {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* Print styles */
  @media print {
    html, body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .no-print { display: none !important; }
  }

  /* Screen-only print button */
  .print-btn {
    position: fixed;
    top: 10px;
    right: 10px;
    padding: 8px 18px;
    font-family: 'Poppins', sans-serif;
    font-size: 12px;
    background: #1a1a1a;
    color: #f5f0e0;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.1em;
    z-index: 100;
  }
  .print-btn:hover { background: #444; }
</style>
</head>
<body>
<button class="print-btn no-print" onclick="window.print()">PRINT / PDF</button>

<div class="page">
  <!-- Title -->
  <div class="title">Paper Piano</div>
  <div class="subtitle">Place flat. Camera overhead. Tap keys.</div>

  <!-- Control markers (above keyboard for camera visibility) -->
  <div class="controls" id="controls"></div>

  <!-- Keyboard section: ribbon + key markers + piano keys -->
  <div class="keyboard-section">
    <!-- Ribbon strip -->
    <div class="ribbon-col" id="ribbon-col"></div>

    <!-- Key area -->
    <div class="key-area">
      <!-- Key markers row -->
      <div class="key-markers" id="key-markers"></div>

      <!-- Piano keys (visual) -->
      <div class="piano" id="piano"></div>
    </div>
  </div>

  <!-- Footer (reserved) -->
</div>

<script>
// ─── ArUco DICT_4X4_1000 dictionary data (first 100 entries) ────────────────
// Each entry: [byte0, byte1] → 16 bits for 4×4 inner grid
// 1 = white, 0 = black. MSB-first: bits 15-12 = row 0, 11-8 = row 1, etc.
const DICT = [
  [181,50],[15,154],[51,45],[153,70],[84,158],[121,205],[158,46],[196,242],     // 0-7
  [254,218],[207,86],[249,145],[17,167],[14,183],[42,15],[36,177],[38,62],       // 8-15
  [70,101],[102,0],[108,94],[118,175],[134,139],[176,43],[204,213],[221,130],    // 16-23
  [254,71],[148,113],[172,228],[165,84],[33,35],[52,111],[68,21],[87,178],       // 24-31
  [158,207],[240,203],[8,174],[9,41],[24,117],[4,255],[13,246],[28,90],          // 32-39
  [23,24],[42,40],[50,140],[56,178],[36,232],[46,235],                           // 40-45
  [45,63],[75,100],[80,46],[80,19],[81,148],[85,104],[93,65],                    // 46-52
  [95,151],[104,1],[104,103],[97,36],[97,233],                                   // 53-57
  [107,18],[111,229],[103,223],[126,27],[128,160],[131,68],[139,162],[147,122],  // 58-65
  [132,108],[133,42],[133,156],[156,137],[159,161],[187,124],[188,4],[182,91],   // 66-73
  [191,200],[183,171],[202,31],[201,98],[217,88],[211,213],[204,152],[199,160],  // 74-81
  [197,55],[233,93],[249,37],[251,187],[238,42],[247,77],[53,117],[138,173],     // 82-89
  [118,23],[10,207],[6,75],[45,193],[73,216],[67,244],[79,54],[79,211],          // 90-97
  [105,228],[112,199],                                                           // 98-99
];

function decodeBits(bytes) {
  const val = (bytes[0] << 8) | bytes[1];
  const grid = [];
  for (let r = 0; r < 4; r++) {
    const row = [];
    for (let c = 0; c < 4; c++) {
      row.push((val >> (15 - r * 4 - c)) & 1);
    }
    grid.push(row);
  }
  return grid;
}

// Generate ArUco marker as a canvas element (6×6 grid: 1px border + 4×4 data)
function makeMarker(id, sizeMM) {
  const cellCount = 6;
  const pxPerCell = 12; // resolution for crisp rendering
  const totalPx = cellCount * pxPerCell;

  const canvas = document.createElement('canvas');
  canvas.width = totalPx;
  canvas.height = totalPx;
  canvas.className = 'aruco';
  canvas.style.width = sizeMM + 'mm';
  canvas.style.height = sizeMM + 'mm';
  canvas.title = 'ID ' + id;

  const ctx = canvas.getContext('2d');
  const grid = decodeBits(DICT[id]);

  // Fill all black (border)
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, totalPx, totalPx);

  // Draw inner 4×4 white cells
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      if (grid[r][c] === 1) {
        ctx.fillStyle = '#fff';
        ctx.fillRect((c + 1) * pxPerCell, (r + 1) * pxPerCell, pxPerCell, pxPerCell);
      }
    }
  }

  return canvas;
}

// ─── Layout configuration ──────────────────────────────────────────────────
const WHITE_KEY_W = 17; // mm (fits 15 keys in available space)
const NUM_WHITES = 15;  // 2 octaves + top C
const KEYBOARD_W = WHITE_KEY_W * NUM_WHITES; // 252mm
const KEY_MARKER_SIZE = 8; // mm (smaller for tighter spacing)
const RIBBON_MARKER_SIZE = 8; // mm
const CTRL_MARKER_SIZE = 12; // mm

const WHITE_LABELS = ['C','D','E','F','G','A','B','C','D','E','F','G','A','B','C'];
const BLACK_LABELS = ['C#','D#','','F#','G#','A#','C#','D#','','F#','G#','A#'];
const BLACK_POSITIONS = [0,1,3,4,5,7,8,10,11,12]; // both octaves

// White key marker IDs: oct1 = 0-6, oct2 = 46-52, top C = 58
const WHITE_IDS = [0,1,2,3,4,5,6,46,47,48,49,50,51,52,58];
// Black key marker IDs: oct1 = 8-12, oct2 = 53-57
const BLACK_IDS = [8,9,10,11,12,53,54,55,56,57];
const BLACK_LABEL_NAMES = ['C#','D#','F#','G#','A#','C#','D#','F#','G#','A#'];

// White key marker centers (mm from keyboard left)
const whiteXs = WHITE_LABELS.map((_, i) => i * WHITE_KEY_W + WHITE_KEY_W / 2);
// Black key marker centers
const blackXs = BLACK_POSITIONS.map(lw => (lw + 1) * WHITE_KEY_W);

// ─── Build key markers row ────────────────────────────────────────────────
const keyMarkersEl = document.getElementById('key-markers');

// White key markers (IDs 0-6 oct1, 46-52 oct2)
whiteXs.forEach((x, i) => {
  const wrap = document.createElement('div');
  wrap.className = 'key-marker';
  wrap.style.left = (x - KEY_MARKER_SIZE / 2) + 'mm';
  wrap.style.top = '0';
  wrap.appendChild(makeMarker(WHITE_IDS[i], KEY_MARKER_SIZE));
  const lbl = document.createElement('div');
  lbl.className = 'key-marker-label';
  lbl.textContent = WHITE_LABELS[i];
  wrap.appendChild(lbl);
  keyMarkersEl.appendChild(wrap);
});

// Black key markers (IDs 8-12 oct1, 53-57 oct2)
blackXs.forEach((x, i) => {
  const wrap = document.createElement('div');
  wrap.className = 'key-marker';
  wrap.style.left = (x - KEY_MARKER_SIZE / 2) + 'mm';
  wrap.style.top = '0';
  wrap.appendChild(makeMarker(BLACK_IDS[i], KEY_MARKER_SIZE));
  const lbl = document.createElement('div');
  lbl.className = 'key-marker-label';
  lbl.textContent = BLACK_LABEL_NAMES[i];
  wrap.appendChild(lbl);
  keyMarkersEl.appendChild(wrap);
});

// ─── Build piano keys (visual only) ──────────────────────────────────────
const pianoEl = document.getElementById('piano');
pianoEl.style.width = KEYBOARD_W + 'mm';
keyMarkersEl.style.width = KEYBOARD_W + 'mm';

// White keys
for (let i = 0; i < NUM_WHITES; i++) {
  const key = document.createElement('div');
  key.className = 'white-key';
  key.style.left = (i * WHITE_KEY_W) + 'mm';
  key.style.width = WHITE_KEY_W + 'mm';
  key.textContent = WHITE_LABELS[i];
  pianoEl.appendChild(key);
}

// Black keys
const BLACK_W = WHITE_KEY_W * 0.58;
BLACK_POSITIONS.forEach((lw, i) => {
  const key = document.createElement('div');
  key.className = 'black-key';
  key.style.left = ((lw + 1) * WHITE_KEY_W - BLACK_W / 2) + 'mm';
  key.style.width = BLACK_W + 'mm';
  key.textContent = BLACK_LABEL_NAMES[i];
  pianoEl.appendChild(key);
});

// ─── Build ribbon strip ──────────────────────────────────────────────────
const ribbonEl = document.getElementById('ribbon-col');
// IDs 13-22, bottom (13) to top (22) → render top to bottom: 22 down to 13
for (let i = 9; i >= 0; i--) {
  const id = 13 + i;
  const row = document.createElement('div');
  row.className = 'ribbon-marker';
  const lbl = document.createElement('div');
  lbl.className = 'ribbon-label';
  lbl.textContent = 'R' + i;
  row.appendChild(lbl);
  row.appendChild(makeMarker(id, RIBBON_MARKER_SIZE));
  ribbonEl.appendChild(row);
}

// ─── Build control section ──────────────────────────────────────────────
const controlsEl = document.getElementById('controls');

function makeCtrlCol(label, items, gridClass) {
  const col = document.createElement('div');
  col.className = 'ctrl-col';
  const lbl = document.createElement('div');
  lbl.className = 'ctrl-col-label';
  lbl.textContent = label;
  col.appendChild(lbl);

  const grid = document.createElement('div');
  grid.className = gridClass || 'ctrl-grid';

  items.forEach(item => {
    if (typeof item === 'string') {
      // Sublabel divider
      const sub = document.createElement('div');
      sub.className = 'ctrl-sublabel';
      sub.textContent = item;
      grid.appendChild(sub);
      return;
    }
    const wrap = document.createElement('div');
    wrap.className = 'ctrl-item';
    wrap.appendChild(makeMarker(item.id, CTRL_MARKER_SIZE));
    const cl = document.createElement('div');
    cl.className = 'ctrl-label';
    cl.textContent = item.label;
    wrap.appendChild(cl);
    grid.appendChild(wrap);
  });

  col.appendChild(grid);
  controlsEl.appendChild(col);
}

makeCtrlCol('CHORD', [
  {id:23, label:'MAJ'}, {id:24, label:'MIN'}, {id:25, label:'MAJ7'}, {id:26, label:'DOM7'},
  {id:27, label:'\u00BDDIM'}, {id:28, label:'DIM'}, {id:29, label:'AUG'}, {id:30, label:'PWR'},
], 'ctrl-grid-4');

// ARP + RATE in one shared box with two sub-columns
(function() {
  const col = document.createElement('div');
  col.className = 'ctrl-col';

  const dual = document.createElement('div');
  dual.className = 'ctrl-col-dual';

  // ARP sub-column
  const arpDiv = document.createElement('div');
  const arpLbl = document.createElement('div');
  arpLbl.className = 'ctrl-col-label';
  arpLbl.textContent = 'ARP';
  arpDiv.appendChild(arpLbl);
  const arpGrid = document.createElement('div');
  arpGrid.className = 'ctrl-grid';
  [{id:31, label:'OFF'}, {id:32, label:'UP'}, {id:33, label:'DN'},
   {id:34, label:'\u25B2\u25BC'}, {id:35, label:'RND'}].forEach(item => {
    const wrap = document.createElement('div');
    wrap.className = 'ctrl-item';
    wrap.appendChild(makeMarker(item.id, CTRL_MARKER_SIZE));
    const cl = document.createElement('div');
    cl.className = 'ctrl-label';
    cl.textContent = item.label;
    wrap.appendChild(cl);
    arpGrid.appendChild(wrap);
  });
  arpDiv.appendChild(arpGrid);

  // RATE sub-column
  const rateDiv = document.createElement('div');
  const rateLbl = document.createElement('div');
  rateLbl.className = 'ctrl-col-label';
  rateLbl.textContent = 'RATE';
  rateDiv.appendChild(rateLbl);
  const rateGrid = document.createElement('div');
  rateGrid.className = 'ctrl-grid';
  [{id:36, label:'\uD834\uDD5D'}, {id:37, label:'\uD834\uDD5E'}, {id:38, label:'\u2669'},
   {id:39, label:'\u266A'}, {id:40, label:'\u266C'}].forEach(item => {
    const wrap = document.createElement('div');
    wrap.className = 'ctrl-item';
    wrap.appendChild(makeMarker(item.id, CTRL_MARKER_SIZE));
    const cl = document.createElement('div');
    cl.className = 'ctrl-label';
    cl.textContent = item.label;
    wrap.appendChild(cl);
    rateGrid.appendChild(wrap);
  });
  rateDiv.appendChild(rateGrid);

  dual.appendChild(arpDiv);
  dual.appendChild(rateDiv);
  col.appendChild(dual);
  controlsEl.appendChild(col);
})();

makeCtrlCol('CTRL', [
  {id:41, label:'OCT\u2212'}, {id:42, label:'OCT+'}, {id:43, label:'SUSTAIN'},
  {id:44, label:'MOD'}, {id:45, label:'VOL'},
]);
</script>
</body>
</html>
